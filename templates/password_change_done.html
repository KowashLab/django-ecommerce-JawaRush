{% extends "base.html" %}
{% load static %}

{% block title %}Password Changed | Hop & Barley{% endblock %}

{% block main_class %}auth-page-wrapper{% endblock %}

{% block content %}
  <div class="auth-background">
    <img src="{% static 'img/background/pattern.jpg' %}" alt="Background pattern">
  </div>
  <div class="auth-form-container">
    <div class="auth-container auth-container--login">
      <div class="Legend">
        <h1 class="auth-title">Password Changed</h1>
      </div>
      <p class="text-center-spaced">Your password has been changed successfully.</p>
      <div class="ButtonGroup">
        <a href="{% url 'account' %}" class="button button--primary">Back to Account</a>
      </div>
    </div>
  </div>
{% endblock %}
