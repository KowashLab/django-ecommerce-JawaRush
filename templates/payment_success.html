{% extends "base.html" %}

{% block title %}Payment Successful | Hop & Barley{% endblock %}

{% block content %}
<main class="cart-page-wrapper">
  <div class="cart-container">
    <h1 class="cart-title">Payment Successful</h1>
    <p>Order <strong>#{{ order.pk }}</strong> has been paid.</p>
    <p>Status: <strong>{{ order.get_status_display }}</strong></p>
    <p>Total: <strong>${{ order.total_price }}</strong></p>

    <a href="{% url 'home' %}" class="button button--primary" style="margin-top: 2rem; display: inline-block;">Continue Shopping</a>
  </div>
</main>
{% endblock %}
