{% extends "base.html" %}

{% block title %}Payment Successful | Hop & Barley{% endblock %}

{% block main_class %}cart-page-wrapper{% endblock %}

{% block content %}
  <div class="cart-container">
    <div class="empty-state">
      <i class="fa-solid fa-circle-check empty-state__icon empty-state__icon--success"></i>
      <h1 class="cart-title">Payment Successful</h1>
      <p>Order <strong>#{{ order.pk }}</strong> has been paid.</p>
      <p>Total: <strong>${{ order.total_price }}</strong></p>
      <a href="{% url 'home' %}" class="button button--primary success-cta">Back to catalog</a>
    </div>
  </div>
{% endblock %}
